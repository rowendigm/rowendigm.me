name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NEXT_PUBLIC_SITE_URL: https://rowendigm.me

jobs:
  verify:
    name: verify (typecheck + lint + build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.x"

      # The app is scaffolded later (Phase 2). Until package.json exists the
      # gate is a graceful no-op so the harness-only repo still passes CI.
      - name: Skip if app not scaffolded
        id: guard
        run: |
          if [ ! -f package.json ]; then
            echo "App not scaffolded yet (no package.json) — skipping verify."
            echo "scaffolded=false" >> "$GITHUB_OUTPUT"
          else
            echo "scaffolded=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.guard.outputs.scaffolded == 'true'
        run: bun install --frozen-lockfile

      - name: Typecheck
        if: steps.guard.outputs.scaffolded == 'true'
        run: bun run typecheck

      - name: Lint
        if: steps.guard.outputs.scaffolded == 'true'
        run: bun run lint

      - name: Build
        if: steps.guard.outputs.scaffolded == 'true'
        run: bun run build
