name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NEXT_PUBLIC_SITE_URL: https://rowendigm.me

jobs:
  # Detect what changed — job-level filters instead of trigger-level `paths`,
  # so the required `verify` check always reports (a `paths`-skipped workflow
  # would leave the check "Expected" forever and block the merge).
  changes:
    name: detect changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Filter paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - "app/**"
              - "components/**"
              - "content/**"
              - "lib/**"
              - "public/**"
              - "package.json"
              - "bun.lock"
              - "tsconfig.json"
              - "biome.json"
              - "*.config.*"
              - ".github/workflows/ci.yml"

  typecheck:
    name: typecheck
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".node-version"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

  lint:
    name: lint
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".node-version"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

  build:
    name: build
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".node-version"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

  # Summary gate — the single required check. Green when the three jobs pass,
  # or when they were skipped because no code changed.
  verify:
    name: verify (typecheck + lint + build)
    needs: [changes, typecheck, lint, build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Gate
        run: |
          results="${{ needs.typecheck.result }} ${{ needs.lint.result }} ${{ needs.build.result }}"
          echo "results: $results"
          for r in $results; do
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then
              echo "verify failed"
              exit 1
            fi
          done
          echo "verify ok"
